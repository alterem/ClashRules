rules:
  - DOMAIN-SUFFIX,google.com,🚀 默认代理
  - RULE-SET,reject_tracker,🛑 屏蔽
  - RULE-SET,private_domain,🎯 直连
  - RULE-SET,proxy_tracker,🚀 默认代理
  - RULE-SET,direct_tracker,🎯 直连
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,disney_domain,🎬 DISNEY
  - RULE-SET,gfw_domain,🚀 默认代理
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,🎯 直连
  - RULE-SET,google_ip,🚀 默认代理,no-resolve
  - RULE-SET,netflix_ip,🎥 NETFLIX,no-resolve
  - RULE-SET,cn_ip,🎯 直连
  - MATCH,🐟 漏网之鱼

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

rule-providers: 
  private_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  proxy_tracker: { <<: *class, url: "https://raw.githubusercontent.com/alterem/ClashRules/refs/heads/main/proxy.list"}
  direct_tracker: { <<: *class, url: "https://raw.githubusercontent.com/alterem/ClashRules/refs/heads/main/direct.list"}
  reject_tracker: { <<: *class, url: "https://raw.githubusercontent.com/alterem/ClashRules/refs/heads/main/reject.list"}
  youtube_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  netflix_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs"}
  disney_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/disney.mrs"}
  gfw_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs"}
  geolocation-!cn: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"}
  cn_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
  cn_ip: { <<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
  google_ip: { <<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.mrs"}
  netflix_ip: { <<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/netflix.mrs"}

proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [♻️ 自动选择, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇸🇬 新加坡节点, 🇹🇷 土耳其节点, 🌐 全部节点, DIRECT]}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 50, interval: 300}
  - {name: 📹 YouTube, type: select, proxies: [🚀 默认代理, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇸🇬 新加坡节点, 🌐 全部节点]}
  - {name: 🎥 NETFLIX, type: select, proxies: [🇹🇷 土耳其节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, 🌐 全部节点]}
  - {name: 🎬 DISNEY, type: select, proxies: [🇸🇬 新加坡节点, 🇹🇷 土耳其节点, 🇺🇸 美国节点, 🌐 全部节点]}
  - {name: 🎯 直连, type: select, proxies: [DIRECT, 🚀 默认代理]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, ♻️ 自动选择, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇸🇬 新加坡节点, 🇹🇷 土耳其节点, 🌐 全部节点, DIRECT]}
  - {name: 🛑 屏蔽, type: select, proxies: [REJECT, DIRECT, 🚀 默认代理]}
  
  # 地区节点分组
  - {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?i)^(?=.*(港|hk|HK|hongkong|hong kong))(?!.*(回国|校园|游戏|教育|久虚|cn)).*$"}
  - {name: 🇺🇸 美国节点, type: select, include-all: true, filter: "(?i)^(?=.*(美|us|US|united states|unitedstates))(?!.*(回国|校园|游戏|教育|久虚|cn)).*$"}
  - {name: 🇸🇬 新加坡节点, type: select, include-all: true, filter: "(?i)^(?=.*(新加坡|sg|SG|singapore))(?!.*(回国|校园|游戏|教育|久虚|cn)).*$"}
  - {name: 🇹🇷 土耳其节点, type: select, include-all: true, filter: "(?i)^(?=.*(土耳其|tr|TR|turkey))(?!.*(回国|校园|游戏|教育|久虚|cn)).*$"}
  - {name: 🌐 全部节点, type: select, include-all: true}
